pid /tmp/my-music-nginx.pid;

events {
    worker_connections 1024;
}

http {
    include upstreams.conf;

    server {
        listen 8080;
        location /api/catalog/ {
            proxy_pass http://catalog;
        }
        location /api/playlist/ {
            proxy_pass http://playlist;
        }
        location /api/playback/ {
            proxy_pass http://playback;
        }
        location /api/user/ {
            proxy_pass http://user;
        }
    }
}